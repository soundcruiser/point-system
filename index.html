<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Point Admin</title>
    
    <!-- アプリ化設定 (PWA) -->
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <!-- デザインとライブラリ -->
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>ポイント管理システム</h1>
        </header>

        <!-- メインメニュー -->
        <nav id="menu">
            <div class="menu-group menu-group-attendance">
                <h2 class="menu-group-title">出席登録</h2>
                <p class="menu-group-desc">本日1回限り、出席スキャンで <strong>+10pt</strong> を付与します。</p>
                <button id="btn-attendance" type="button" class="btn-main success">
                    <span class="icon">📅</span> 出席QRをスキャン
                </button>
            </div>

            <div class="menu-group menu-group-redeem">
                <h2 class="menu-group-title">商品の交換（購入）</h2>
                <p class="menu-group-desc">商品を選んでから利用者QRを読み取り、<strong>所持ポイント</strong>で交換します。</p>
                <button id="btn-items" type="button" class="btn-main primary">
                    <span class="icon">🎁</span> 商品一覧から選ぶ
                </button>
            </div>

            <div class="menu-group menu-group-admin">
                <h2 class="menu-group-title">管理・履歴</h2>
                <button id="btn-user-admin" type="button" class="btn-main secondary">
                    <span class="icon">👥</span> 利用者一覧・登録
                </button>
                <button id="btn-history" type="button" class="btn-main secondary">
                    <span class="icon">📜</span> 全履歴を確認
                </button>
            </div>
        </nav>

        <!-- QRリーダー画面 -->
        <section id="qr-section" class="hidden">
            <div class="section-header"><h2 id="mode-title">スキャン中...</h2></div>
            <div id="reader"></div>
            <button id="btn-qr-cancel" class="btn-cancel" onclick="window.stopScanner()">キャンセルして戻る</button>
        </section>

        <!-- 商品選択画面 -->
        <section id="item-section" class="hidden">
            <div class="section-intro">
                <h2>商品を選んでください</h2>
                <p class="section-hint">QRスキャン後にその方の<strong>所持ポイント</strong>と照合し、足りれば交換できます。</p>
            </div>
            <div id="item-list"></div>
            <button id="btn-item-back" class="btn-cancel" onclick="window.hideSections()">戻る</button>
        </section>

        <!-- 利用者管理画面 -->
        <section id="user-admin-section" class="hidden">
            <h2>利用者管理</h2>
            <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd;">
                <h3>新規ユーザー登録</h3>
                <input type="text" id="new-user-id" placeholder="ID (例: USER001)" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;">
                <input type="text" id="new-user-name" placeholder="お名前" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;">
                <button onclick="window.addUser()" class="btn-main success" style="width: 100%;">登録する</button>
            </div>
            <div id="user-list"></div>
            <button id="btn-user-back" class="btn-cancel" onclick="window.hideSections()">戻る</button>
        </section>

        <!-- 履歴表示画面 -->
        <section id="history-section" class="hidden">
            <h2>最近の履歴</h2>
            <div id="history-list"></div>
            <button id="btn-history-back" class="btn-cancel" onclick="window.hideSections()">戻る</button>
        </section>

        <!-- 通知ログ -->
        <div id="log-container"></div>
    </div>

    <!-- JavaScript本体 -->
    <script type="module" src="app.js"></script>
</body>
</html>
